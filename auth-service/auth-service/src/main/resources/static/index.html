<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Portfolio</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #2d333b;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --accent: #2f81f7;
            --green: #3fb950;
            --red: #f85149;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }

        .card {
            max-width: 380px;
            margin: 80px auto;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-align: center;
            margin-bottom: 4px;
        }
        .subtitle {
            color: var(--text-dim);
            font-size: 14px;
            text-align: center;
            margin-bottom: 24px;
        }

        .field { margin-bottom: 16px; }
        .field label {
            display: block;
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 6px;
        }
        .field input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
        }
        .field input:focus { border-color: var(--accent); }

        button {
            width: 100%;
            padding: 11px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .msg {
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            min-height: 18px;
        }
        .msg.err { color: var(--red); }
        .msg.ok { color: var(--green); }

        .login-link {
            margin-top: 16px;
            text-align: center;
            font-size: 13px;
            color: var(--text-dim);
        }
        .login-link a { color: var(--accent); text-decoration: none; }
        .login-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <h1>Регистрация</h1>
    <div class="subtitle">Создайте аккаунт для доступа к портфелю</div>

    <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="username">
    </div>
    <div class="field">
        <label for="password">Пароль</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
    </div>
    <div class="field">
        <label for="password2">Повторите пароль</label>
        <input type="password" id="password2" placeholder="••••••••" autocomplete="new-password">
    </div>

    <button id="register-btn" onclick="register()">Зарегистрироваться</button>
    <div class="msg" id="msg"></div>

    <div class="login-link">
        Уже есть аккаунт? <a href="http://localhost:8084/" id="dashboard-link">Войти в портфель</a>
    </div>
</div>

<script>
    const DASHBOARD_URL = "http://localhost:8084/";

    function showMsg(text, isError) {
        const el = document.getElementById("msg");
        el.textContent = text;
        el.className = "msg " + (isError ? "err" : "ok");
    }

    async function register() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const password2 = document.getElementById("password2").value;
        const btn = document.getElementById("register-btn");

        showMsg("", false);
        if (!email || !password) {
            showMsg("Введите email и пароль", true);
            return;
        }
        if (password !== password2) {
            showMsg("Пароли не совпадают", true);
            return;
        }

        btn.disabled = true;
        btn.textContent = "Регистрация...";
        try {
            // страница отдаётся самим auth-service — запрос same-origin
            const resp = await fetch("/auth/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });

            if (resp.status === 409) {
                showMsg("Такой email уже зарегистрирован", true);
                return;
            }
            if (resp.status === 400) {
                showMsg("Проверьте корректность email и пароля", true);
                return;
            }
            if (!resp.ok) {
                showMsg("Ошибка регистрации (" + resp.status + ")", true);
                return;
            }

            showMsg("Аккаунт создан! Перенаправляем на вход...", false);
            setTimeout(() => { window.location.href = DASHBOARD_URL; }, 1500);
        } catch (e) {
            showMsg("Сервер недоступен", true);
        } finally {
            btn.disabled = false;
            btn.textContent = "Зарегистрироваться";
        }
    }

    // Enter в любом поле = регистрация
    for (const id of ["email", "password", "password2"]) {
        document.getElementById(id).addEventListener("keydown", (e) => {
            if (e.key === "Enter") register();
        });
    }
</script>
</body>
</html>
