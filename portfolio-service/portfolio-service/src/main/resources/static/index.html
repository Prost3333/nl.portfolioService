<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface-2: #1c2333;
            --border: #2d333b;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --accent: #2f81f7;
            --green: #3fb950;
            --red: #f85149;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 32px; }

        /* Login */
        #login-view {
            max-width: 380px;
            margin: 80px auto;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
        }

        #login-view h1 { text-align: center; margin-bottom: 24px; }

        .field { margin-bottom: 16px; }
        .field label {
            display: block;
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 6px;
        }
        .field input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
        }
        .field input:focus { border-color: var(--accent); }

        button {
            width: 100%;
            padding: 11px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .error {
            color: var(--red);
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            min-height: 18px;
        }

        .register-link {
            margin-top: 8px;
            text-align: center;
            font-size: 13px;
            color: var(--text-dim);
        }
        .register-link a { color: var(--accent); text-decoration: none; }
        .register-link a:hover { text-decoration: underline; }

        /* Dashboard */
        #dashboard-view { display: none; }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 32px;
        }

        .header-actions { display: flex; gap: 10px; }
        .logout-btn {
            width: auto;
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-weight: 500;
        }
        .logout-btn:hover { border-color: var(--red); color: var(--red); opacity: 1; }
        .snapshot-btn {
            width: auto;
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-weight: 500;
        }
        .snapshot-btn:hover { background: var(--accent); color: #fff; opacity: 1; }

        .total-card {
            background: linear-gradient(135deg, var(--surface) 0%, var(--surface-2) 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            margin-bottom: 24px;
        }
        .total-label { color: var(--text-dim); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .total-value { font-size: 42px; font-weight: 700; letter-spacing: -1px; margin-top: 4px; }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 24px;
        }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
        }
        .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }

        .chart-wrap { position: relative; height: 320px; }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th {
            text-align: left;
            color: var(--text-dim);
            font-weight: 500;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 8px 8px;
            border-bottom: 1px solid var(--border);
        }
        th.num, td.num { text-align: right; }
        td {
            padding: 10px 8px;
            border-bottom: 1px solid var(--border);
        }
        tr:last-child td { border-bottom: none; }
        .ticker { font-weight: 600; }
        .name-dim { color: var(--text-dim); font-size: 12px; }
        .alloc-bar {
            display: inline-block;
            height: 6px;
            background: var(--accent);
            border-radius: 3px;
            vertical-align: middle;
            margin-right: 6px;
        }

        .loading { text-align: center; color: var(--text-dim); padding: 40px; }

        tr.unavailable td { opacity: 0.5; }
        .badge-na {
            display: inline-block;
            font-size: 11px;
            color: var(--red);
            border: 1px solid var(--red);
            border-radius: 4px;
            padding: 1px 6px;
        }

        /* Управление позициями */
        .add-form {
            display: grid;
            grid-template-columns: 130px 1fr 130px auto;
            gap: 12px;
            align-items: end;
            margin-bottom: 20px;
        }
        @media (max-width: 768px) { .add-form { grid-template-columns: 1fr; } }
        .add-form .field { margin-bottom: 0; }
        .add-btn {
            width: auto;
            padding: 10px 20px;
            white-space: nowrap;
        }
        .delete-btn {
            width: auto;
            padding: 5px 12px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 500;
        }
        .delete-btn:hover { border-color: var(--red); color: var(--red); opacity: 1; }
        .form-msg { font-size: 13px; margin-top: 10px; min-height: 18px; }
        .form-msg.ok { color: var(--green); }
        .form-msg.err { color: var(--red); }

        /* Переключатель периодов */
        .period-switch { display: flex; gap: 6px; }
        .period-btn {
            width: auto;
            padding: 5px 12px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 500;
        }
        .period-btn:hover { border-color: var(--accent); color: var(--text); opacity: 1; }
        .period-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .card-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .card-head h2 { margin-bottom: 0; }
    </style>
</head>
<body>
<div class="container">

    <!-- LOGIN -->
    <div id="login-view">
        <h1>Portfolio</h1>
        <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="username">
        </div>
        <div class="field">
            <label for="password">Пароль</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button id="login-btn" onclick="login()">Войти</button>
        <div class="error" id="login-error"></div>
        <div class="register-link">
            Нет аккаунта? <a href="http://localhost:8081/">Зарегистрироваться</a>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard-view">
        <div class="header-row">
            <div>
                <h1>Мой портфель</h1>
                <div class="subtitle">Данные обновляются из Yahoo Finance</div>
            </div>
            <div class="header-actions">
                <button class="snapshot-btn" id="snapshot-btn" onclick="saveSnapshot()">Сохранить снимок</button>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </div>

        <div class="total-card">
            <div class="total-label">Общая стоимость</div>
            <div class="total-value" id="total-value">—</div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>Распределение</h2>
                <div class="chart-wrap">
                    <canvas id="pie-chart"></canvas>
                </div>
            </div>
            <div class="card">
                <h2>Позиции</h2>
                <div id="positions-table"></div>
            </div>
        </div>

        <div class="card" style="margin-top: 24px;">
            <h2>Управление позициями</h2>
            <div class="add-form">
                <div class="field">
                    <label for="new-ticker">Тикер</label>
                    <input type="text" id="new-ticker" placeholder="AAPL">
                </div>
                <div class="field">
                    <label for="new-name">Название</label>
                    <input type="text" id="new-name" placeholder="Apple Inc.">
                </div>
                <div class="field">
                    <label for="new-quantity">Количество</label>
                    <input type="number" id="new-quantity" placeholder="10" min="0" step="any">
                </div>
                <button class="add-btn" id="add-btn" onclick="addPosition()">Добавить</button>
            </div>
            <div class="form-msg" id="manage-msg"></div>
            <div id="manage-table"></div>
        </div>

        <div class="card" style="margin-top: 24px;">
            <div class="card-head">
                <h2>Стоимость во времени</h2>
                <div class="period-switch">
                    <button class="period-btn" data-period="week" onclick="selectPeriod('week')">Неделя</button>
                    <button class="period-btn" data-period="month" onclick="selectPeriod('month')">Месяц</button>
                    <button class="period-btn" data-period="6months" onclick="selectPeriod('6months')">6 мес</button>
                    <button class="period-btn" data-period="year" onclick="selectPeriod('year')">Год</button>
                    <button class="period-btn active" data-period="all" onclick="selectPeriod('all')">Всё</button>
                </div>
            </div>
            <div class="chart-wrap">
                <canvas id="history-chart"></canvas>
            </div>
        </div>
    </div>

</div>

<script>
    // ===== Конфигурация =====
    const AUTH_URL = "http://localhost:8081";
    const PORTFOLIO_URL = "http://localhost:8084";

    // Токен живёт в переменной (как договорились) — при перезагрузке надо логиниться заново
    let token = null;
    let chart = null;
    let historyChart = null;
    let currentPeriod = "all";   // выбранный период графика

    // Палитра для диаграммы
    const COLORS = [
        "#2f81f7", "#3fb950", "#db61a2", "#f0883e", "#a371f7",
        "#56d4dd", "#e3b341", "#f85149", "#7ee787", "#ff9bce"
    ];

    // ===== Логин =====
    async function login() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const errorEl = document.getElementById("login-error");
        const btn = document.getElementById("login-btn");

        errorEl.textContent = "";
        if (!email || !password) {
            errorEl.textContent = "Введите email и пароль";
            return;
        }

        btn.disabled = true;
        btn.textContent = "Вход...";

        try {
            const resp = await fetch(AUTH_URL + "/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });

            if (!resp.ok) {
                errorEl.textContent = resp.status === 401
                    ? "Неверный email или пароль"
                    : "Ошибка входа (" + resp.status + ")";
                return;
            }

            const data = await resp.json();
            token = data.token;

            // Переключаемся на дашборд
            document.getElementById("login-view").style.display = "none";
            document.getElementById("dashboard-view").style.display = "block";

            await loadPortfolio();
        } catch (e) {
            errorEl.textContent = "Сервер недоступен. Запущен ли auth-service?";
        } finally {
            btn.disabled = false;
            btn.textContent = "Войти";
        }
    }

    function logout() {
        token = null;
        if (chart) { chart.destroy(); chart = null; }
        if (historyChart) { historyChart.destroy(); historyChart = null; }
        document.getElementById("dashboard-view").style.display = "none";
        document.getElementById("login-view").style.display = "block";
        document.getElementById("password").value = "";
    }

    // ===== Загрузка портфеля =====
    async function loadPortfolio() {
        const tableEl = document.getElementById("positions-table");
        tableEl.innerHTML = '<div class="loading">Загрузка цен из Yahoo...</div>';

        try {
            const resp = await fetch(PORTFOLIO_URL + "/portfolio/summary", {
                headers: { "Authorization": "Bearer " + token }
            });

            if (!resp.ok) {
                tableEl.innerHTML = '<div class="loading">Ошибка загрузки (' + resp.status + ')</div>';
                return;
            }

            const data = await resp.json();
            render(data);
            loadHistory();   // подгружаем историю для графика во времени
            loadPositions(); // список позиций для управления
        } catch (e) {
            tableEl.innerHTML = '<div class="loading">portfolio-service недоступен</div>';
        }
    }

    // ===== Управление позициями (добавление / удаление) =====
    async function loadPositions() {
        const el = document.getElementById("manage-table");
        try {
            const resp = await fetch(PORTFOLIO_URL + "/positions", {
                headers: { "Authorization": "Bearer " + token }
            });
            if (!resp.ok) {
                el.innerHTML = '<div class="loading">Ошибка загрузки позиций (' + resp.status + ')</div>';
                return;
            }
            renderManageTable(await resp.json());
        } catch (e) {
            el.innerHTML = '<div class="loading">portfolio-service недоступен</div>';
        }
    }

    function renderManageTable(positions) {
        const el = document.getElementById("manage-table");
        if (positions.length === 0) {
            el.innerHTML = '<div class="loading">Позиций пока нет — добавьте первую</div>';
            return;
        }

        let html = '<table><thead><tr>' +
            '<th>Тикер</th>' +
            '<th>Название</th>' +
            '<th class="num">Кол-во</th>' +
            '<th class="num"></th>' +
            '</tr></thead><tbody>';

        for (const p of positions) {
            html += '<tr>' +
                '<td class="ticker">' + escapeHtml(p.ticker) + '</td>' +
                '<td class="name-dim">' + escapeHtml(p.name) + '</td>' +
                '<td class="num">' + formatNum(p.quantity) + '</td>' +
                '<td class="num"><button class="delete-btn" onclick="deletePosition(\'' + p.id + '\', \'' +
                    escapeHtml(p.ticker).replace(/'/g, "\\'") + '\')">Удалить</button></td>' +
                '</tr>';
        }

        html += '</tbody></table>';
        el.innerHTML = html;
    }

    function showManageMsg(text, isError) {
        const el = document.getElementById("manage-msg");
        el.textContent = text;
        el.className = "form-msg " + (isError ? "err" : "ok");
    }

    async function addPosition() {
        const ticker = document.getElementById("new-ticker").value.trim().toUpperCase();
        const name = document.getElementById("new-name").value.trim();
        const quantity = document.getElementById("new-quantity").value;
        const btn = document.getElementById("add-btn");

        if (!ticker || !name || !quantity || Number(quantity) <= 0) {
            showManageMsg("Заполните тикер, название и количество (больше нуля)", true);
            return;
        }

        btn.disabled = true;
        btn.textContent = "Добавление...";
        try {
            const resp = await fetch(PORTFOLIO_URL + "/positions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({ ticker, name, quantity })
            });

            if (!resp.ok) {
                showManageMsg("Не удалось добавить (" + resp.status + ")", true);
                return;
            }

            showManageMsg(ticker + " добавлена", false);
            document.getElementById("new-ticker").value = "";
            document.getElementById("new-name").value = "";
            document.getElementById("new-quantity").value = "";
            await loadPortfolio(); // перезагружает summary, историю и список позиций
        } catch (e) {
            showManageMsg("portfolio-service недоступен", true);
        } finally {
            btn.disabled = false;
            btn.textContent = "Добавить";
        }
    }

    async function deletePosition(id, ticker) {
        if (!confirm("Удалить позицию " + ticker + "?")) return;

        try {
            const resp = await fetch(PORTFOLIO_URL + "/positions/" + id, {
                method: "DELETE",
                headers: { "Authorization": "Bearer " + token }
            });

            if (!resp.ok && resp.status !== 204) {
                showManageMsg("Не удалось удалить (" + resp.status + ")", true);
                return;
            }

            showManageMsg(ticker + " удалена", false);
            await loadPortfolio();
        } catch (e) {
            showManageMsg("portfolio-service недоступен", true);
        }
    }

    // ===== Ручное сохранение снимка =====
    async function saveSnapshot() {
        const btn = document.getElementById("snapshot-btn");
        btn.disabled = true;
        btn.textContent = "Сохранение...";
        try {
            const resp = await fetch(PORTFOLIO_URL + "/portfolio/snapshot", {
                method: "POST",
                headers: { "Authorization": "Bearer " + token }
            });

            if (!resp.ok && resp.status !== 201) {
                btn.textContent = "Ошибка (" + resp.status + ")";
                setTimeout(() => { btn.textContent = "Сохранить снимок"; btn.disabled = false; }, 2000);
                return;
            }

            btn.textContent = "Снимок сохранён ✓";
            await loadHistory();   // обновляем график во времени
            setTimeout(() => { btn.textContent = "Сохранить снимок"; btn.disabled = false; }, 2000);
        } catch (e) {
            btn.textContent = "Сервис недоступен";
            setTimeout(() => { btn.textContent = "Сохранить снимок"; btn.disabled = false; }, 2000);
        }
    }

    // ===== Переключатель периодов =====
    function selectPeriod(period) {
        currentPeriod = period;
        // подсветка активной кнопки
        document.querySelectorAll(".period-btn").forEach(btn => {
            btn.classList.toggle("active", btn.dataset.period === period);
        });
        loadHistory();
    }

    // ===== Загрузка истории (график во времени) =====
    async function loadHistory() {
        try {
            const resp = await fetch(PORTFOLIO_URL + "/portfolio/history?period=" + currentPeriod, {
                headers: { "Authorization": "Bearer " + token }
            });
            if (!resp.ok) return;

            const history = await resp.json();
            renderHistory(history);
        } catch (e) {
            // история не критична — если не загрузилась, просто нет графика
        }
    }

    function renderHistory(history) {
        const ctx = document.getElementById("history-chart");
        if (historyChart) historyChart.destroy();

        historyChart = new Chart(ctx, {
            type: "line",
            data: {
                labels: history.map(h => h.date),
                datasets: [{
                    label: "Стоимость портфеля",
                    data: history.map(h => Number(h.totalValue)),
                    borderColor: "#2f81f7",
                    backgroundColor: "rgba(47, 129, 247, 0.1)",
                    fill: true,
                    tension: 0.3,
                    pointRadius: 4,
                    pointBackgroundColor: "#2f81f7",
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: (c) => " € " + formatMoney(c.parsed.y)
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { color: "#21262d" },
                        ticks: { color: "#8b949e", font: { size: 11 } }
                    },
                    y: {
                        grid: { color: "#21262d" },
                        ticks: {
                            color: "#8b949e",
                            font: { size: 11 },
                            callback: (v) => "€ " + v.toLocaleString("de-DE")
                        }
                    }
                }
            }
        });
    }

    // ===== Отрисовка =====
    function render(data) {
        // Общая стоимость
        document.getElementById("total-value").textContent =
            "€ " + formatMoney(data.totalValue);

        // Сортируем по стоимости (убывание); битые (value null) — в конец
        const positions = [...data.positions].sort((a, b) => {
            const va = a.priceAvailable ? Number(a.value) : -1;
            const vb = b.priceAvailable ? Number(b.value) : -1;
            return vb - va;
        });

        renderChart(positions);
        renderTable(positions);
    }

    function renderChart(positions) {
        const ctx = document.getElementById("pie-chart");
        if (chart) chart.destroy();

        // В диаграмму — только бумаги с доступной ценой
        const valid = positions.filter(p => p.priceAvailable);

        chart = new Chart(ctx, {
            type: "doughnut",
            data: {
                labels: valid.map(p => p.ticker),
                datasets: [{
                    data: valid.map(p => Number(p.value)),
                    backgroundColor: COLORS,
                    borderColor: "#0d1117",
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: "bottom",
                        labels: { color: "#8b949e", padding: 12, font: { size: 11 } }
                    },
                    tooltip: {
                        callbacks: {
                            label: (c) => " " + c.label + ": € " + formatMoney(c.parsed)
                        }
                    }
                }
            }
        });
    }

    function renderTable(positions) {
        let html = '<table><thead><tr>' +
            '<th>Бумага</th>' +
            '<th class="num">Кол-во</th>' +
            '<th class="num">Цена</th>' +
            '<th class="num">Стоимость</th>' +
            '<th class="num">Доля</th>' +
            '</tr></thead><tbody>';

        for (const p of positions) {
            if (!p.priceAvailable) {
                // битая бумага — серым, с пометкой вместо цифр
                html += '<tr class="unavailable">' +
                    '<td><div class="ticker">' + p.ticker + '</div>' +
                    '<div class="name-dim">' + escapeHtml(p.name.trim()) + '</div></td>' +
                    '<td class="num">' + formatNum(p.quantity) + '</td>' +
                    '<td class="num" colspan="3"><span class="badge-na">цена недоступна</span></td>' +
                    '</tr>';
                continue;
            }
            const alloc = Number(p.allocation);
            html += '<tr>' +
                '<td><div class="ticker">' + p.ticker + '</div>' +
                '<div class="name-dim">' + escapeHtml(p.name.trim()) + '</div></td>' +
                '<td class="num">' + formatNum(p.quantity) + '</td>' +
                '<td class="num">€ ' + formatMoney(p.price) + '</td>' +
                '<td class="num">€ ' + formatMoney(p.value) + '</td>' +
                '<td class="num">' +
                    '<span class="alloc-bar" style="width:' + Math.max(2, alloc) + 'px"></span>' +
                    alloc.toFixed(1) + '%</td>' +
                '</tr>';
        }

        html += '</tbody></table>';
        document.getElementById("positions-table").innerHTML = html;
    }

    // ===== Утилиты форматирования =====
    function formatMoney(v) {
        return Number(v).toLocaleString("de-DE", {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
    }
    function formatNum(v) {
        return Number(v).toLocaleString("de-DE", { maximumFractionDigits: 4 });
    }
    function escapeHtml(s) {
        const div = document.createElement("div");
        div.textContent = s;
        return div.innerHTML;
    }

    // Enter в поле пароля = логин
    document.getElementById("password").addEventListener("keydown", (e) => {
        if (e.key === "Enter") login();
    });

    // Enter в полях формы добавления = добавить позицию
    for (const id of ["new-ticker", "new-name", "new-quantity"]) {
        document.getElementById(id).addEventListener("keydown", (e) => {
            if (e.key === "Enter") addPosition();
        });
    }
</script>
</body>
</html>
