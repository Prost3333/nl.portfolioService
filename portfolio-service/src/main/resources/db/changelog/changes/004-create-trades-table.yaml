databaseChangeLog:
  - changeSet:
      id: 004-create-trades-table
      author: Prost3333
      changes:
        - createTable:
            tableName: trades
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: ticker
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: quantity
                  type: NUMERIC(19,4)
                  constraints:
                    nullable: false

              - column:
                  name: price
                  type: NUMERIC(19,4)
                  constraints:
                    nullable: false

              - column:
                  name: type
                  type: VARCHAR(10)
                  constraints:
                    nullable: false

              - column:
                  name: trade_date
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
