databaseChangeLog:
  - changeSet:
      id: 002-create-snapshots-table
      author: dima
      changes:
        - createTable:
            tableName: portfolio_snapshots
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: snapshot_date
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: total_value
                  type: NUMERIC(19,4)
                  constraints:
                    nullable: false